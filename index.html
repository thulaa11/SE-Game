<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Math Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>The Math Game</h1>

    <div id="game-container">
        <div id="top-bar">
            <div id="user-info"></div>
            <div id="best-score">Best score: 0</div>
        </div>

        <div id="controls">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <span id="timer">Time: 0</span>
        </div>

        <!-- Displaying the equation -->
        <div id="equation-container">
            <p id="equation">6 0 + _ = 7 4</p>
        </div>

        <!-- Input field for the missing digit -->
        <div id="input-container">
            <label for="answer">Enter your answer:</label>
            <input type="number" id="answer" />
            <button id="submit-answer">Submit</button>
        </div>

        <!-- Display score -->
        <p id="score">Score: 0</p>

        <!-- Dynamic Image of Banana -->
        <img id="banana-image" src="assets/banana1.png" alt="Banana Image">
    </div>

    <script src="game.js"></script>
</body>
</html>
